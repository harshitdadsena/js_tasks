<!DOCTYPE html>
<html>
<head>
    <title>Startup Landing Page</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        header {
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .hero {
            background: #f4f4f4;
            text-align: center;
            padding: 60px 20px;
        }

        .hero h1 {
            font-size: 40px;
        }

        .hero p {
            font-size: 18px;
            color: #555;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 20px;
            background: #333;
            color: white;
            text-decoration: none;
        }

        .features {
            display: flex;
            justify-content: space-around;
            padding: 40px;
        }

        .feature-box {
            width: 30%;
            text-align: center;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 10px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .features {
                flex-direction: column;
            }

            .feature-box {
                width: 100%;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>

<header>
    <h2>STARTUP</h2>
</header>

<section class="hero">
    <h1>Welcome to Our Startup</h1>
    <p>We provide amazing solutions for your problems.</p>
    <a href="#" class="btn">Get Started</a>
</section>

<section class="features">
    <div class="feature-box">
        <h3>Fast</h3>
        <p>Quick performance</p>
    </div>

    <div class="feature-box">
        <h3>Secure</h3>
        <p>Safe and reliable</p>
    </div>

    <div class="feature-box">
        <h3>Easy</h3>
        <p>User friendly</p>
    </div>
</section>

<footer>
    <p>only for ReBase</p>
</footer>

</body>
</html>
