<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 200px;
            background: #333;
            opacity: 0.75;
            color: white;
            height: 100vh;
            padding: 20px;
        }

        .sidebar h2 {
            margin-bottom: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            margin: 10px 0;
        }

        .sidebar a:hover {
            text-decoration: underline;
        }

        /* Main content */
        .main {
            flex: 1;
            background: #f4f4f4;
            padding: 20px;
        }

        .cards {
            display: flex;
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            flex: 1;
            text-align: center;
            border-radius: 5px;
            box-shadow: 0 0 5px #ccc;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Dashboard</h2>
    <a href="#">Home</a>
    <a href="#">Users</a>
    <a href="#">Settings</a>
</div>

<div class="main">
    <h1>Welcome, User</h1>

    <div class="cards">
        <div class="card">
            <h3>Users</h3>
            <p>120</p>
        </div>

        <div class="card">
            <h3>Sales</h3>
            <p>₹15,000</p>
        </div>

        <div class="card">
            <h3>Orders</h3>
            <p>75</p>
        </div>
    </div>
</div>

</body>
</html>
