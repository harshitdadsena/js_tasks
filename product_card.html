<!DOCTYPE html>
<html>
<head>
    <title>Product Card</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: lavender;
            width: 250px;
            border-radius: 8px;
            box-shadow: 0 0 10px #ccc;
            overflow: hidden;
            text-align: center;
        }

        .card img {
            width: 100%;
        }

        .card h3 {
            margin: 10px 0;
        }

        .price {
            color: green;
            font-weight: bold;
        }

        .btn {
            display: block;
            margin: 15px;
            padding: 10px;
            background: #333;
            color: lime;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background: #999;
        }
    </style>
</head>
<body>

<div class="card">
    <img src="https://www.google.com/imgres?q=omnitrix%20watch&imgurl=https%3A%2F%2Fstatic.wikia.nocookie.net%2Fben10%2Fimages%2F0%2F0a%2FRecalibrated_Omnitrix.png%2Frevision%2Flatest%2Fscale-to-width%2F360%3Fcb%3D20231208211937&imgrefurl=https%3A%2F%2Fben10.fandom.com%2Fwiki%2FOmnitrix_(Original)&docid=xoRhsUPoyYAsXM&tbnid=UXq0l3cx5st1FM&vet=12ahUKEwjXr8SJ54iUAxWFdPUHHQWuK-gQnPAOegQIKBAB..i&w=360&h=495&hcb=2&ved=2ahUKEwjXr8SJ54iUAxWFdPUHHQWuK-gQnPAOegQIKBAB" alt="Product">
    <h3>OMNITRIX</h3>
    <p class="price">₹499</p>
    <a href="#" class="btn">Buy Now</a>
</div>

</body>
</html>
