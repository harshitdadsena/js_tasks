<!DOCTYPE html>
<html>
<head>
    <title>Product Card</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: lavender;
            width: 250px;
            border-radius: 8px;
            box-shadow: 0 0 10px #ccc;
            overflow: hidden;
            text-align: center;
        }

        .card img {
            width: 100%;
        }

        .card h3 {
            margin: 10px 0;
        }

        .price {
            color: green;
            font-weight: bold;
        }

        .btn {
            display: block;
            margin: 15px;
            padding: 10px;
            background: #333;
            color: lime;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background: #999;
        }
    </style>
</head>
<body>

<div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/en/5/5f/Omnitrix.png" alt="Omnitrix">
    <h3>OMNITRIX</h3>
    <p class="price">₹499</p>
    <a href="#" class="btn">Buy Now</a>
</div>

</body>
</html>
